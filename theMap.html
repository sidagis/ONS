<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Den norske kontinentalsokkelen</title>

  <!-- ArcGIS Maps SDK for JavaScript 4.32 (last 4.x, stable). CDN load. -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.32/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.32/"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================== BASE / LAYOUT ============================== */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: "Open Sans", Helvetica, Arial, sans-serif;
      background: #fdfbfb;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #appRoot {
      position: absolute;
      inset: 0;
    }

#viewScaler {
  position: absolute;
  inset: 0;
}
#viewDiv {
  position: absolute;
  inset: 0;
}

    /* Hide the default ArcGIS UI we don't want on a kiosk. We keep zoom only. */
    .esri-ui-corner .esri-component.esri-attribution { display: none !important; }
    .esri-popup { display: none !important; }

    /* ============================== TITLE OVERLAY (floats ON the map) ============================== */
#titleOverlay {
  position: absolute;
  top: 28px;
  left: 36px;
  display: flex;
  align-items: center;
  gap: 22px;
  z-index: 30;
  pointer-events: none; /* never blocks map gestures */
}
#titleLogo {
  flex: 0 0 auto;
  width: 150px;
  height: 150px;
  filter: drop-shadow(0 0 6px rgba(255,255,255,0.95))
          drop-shadow(0 2px 4px rgba(0,0,0,0.25));
}
#titleLogo svg { width: 100%; height: 100%; }
#titleText {
  display: flex;
  flex-direction: column;
  line-height: 1.0;
}
#titleText .line1 {
  font-size: 42px;
  font-weight: 800;
  color: #1d1d1b;
  letter-spacing: -0.5px;
  text-shadow:
    -1px -1px 0 #fff,  1px -1px 0 #fff,
    -1px  1px 0 #fff,  1px  1px 0 #fff,
     0    0   8px rgba(255,255,255,0.9);
}
#titleText .line2 {
  font-size: 50px;
  font-weight: 800;
  color: #1d1d1b;
  letter-spacing: -1px;
  text-shadow:
    -1px -1px 0 #fff,  1px -1px 0 #fff,
    -1px  1px 0 #fff,  1px  1px 0 #fff,
     0    0   10px rgba(255,255,255,0.9);
}

    /* ============================== LEGEND (PNG placeholder) ============================== */
    #legendBox {
      position: absolute;
      left: 14px;
      bottom: 14px;
      width: 200px;
      background: rgba(255,255,255,0.96);
      border: 1px solid #b9b9b9;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      padding: 10px;
      box-sizing: border-box;
      z-index: 25;
    }

#legendSvg {
  display: block;
  width: 100%;
  height: auto;
}
    #legendPlaceholder {
      width: 100%;
      height: 360px;
      border: 2px dashed #9aa4b0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #6b7682;
      font-size: 14px;
      padding: 12px;
      box-sizing: border-box;
    }

    /* ============================== BUTTON PANEL (right side) ============================== */
    #buttonPanel {
      position: absolute;
      top: 1085px;
      right: 14px;
      width: 310px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 25;
    }

    .kioskBtn {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      padding: 18px 20px;
      box-sizing: border-box;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #1b3a5b 0%, #2c5f8a 100%);
      color: #fff;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.30);
      transition: transform 0.08s ease, box-shadow 0.12s ease, filter 0.12s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .kioskBtn:active {
      transform: translateY(2px) scale(0.985);
      box-shadow: 0 2px 6px rgba(0,0,0,0.30);
      filter: brightness(1.12);
    }
    .kioskBtn .btnTitle {
      font-size: 27px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .kioskBtn .btnSub {
      font-size: 16px;
      font-weight: 400;
      opacity: 0.85;
    }
    /* A subtle "tap me" affordance */
    .kioskBtn::after {
      content: "👆";
      position: absolute;
      filter: grayscale(1) brightness(3);
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 25px;
      opacity: 0.55;
    }

    /* Group: navigation buttons (seas) get a distinct accent */
    .kioskBtn.nav { background: linear-gradient(135deg, #009640 0%, #009640 100%); }
    /* Group: thematic data buttons */
    .kioskBtn.data { background: linear-gradient(135deg, #004f9f 0%, #004f9f 100%); }

    .panelHeading {
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.9;
      margin: 6px 4px 0 4px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    /* ============================== LOADING / BUSY OVERLAY ============================== */
    #busy {
      position: absolute;
      inset: 0;
      background: rgba(13,27,42,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      color: #fff;
      font-size: 20px;
    }
    #busy.show { display: flex; }
    .spinner {
      width: 46px; height: 46px;
      border: 5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-right: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Keep zoom buttons big enough for fingers */
    .esri-zoom .esri-widget--button {
      width: 54px; height: 54px; font-size: 22px;
    }
  </style>
</head>

  const TYPES = ["pointerdown", "pointermove", "pointerup",
                 "pointercancel", "pointerleave", "pointerenter"];

  TYPES.forEach(function (type) {
    scaler.addEventListener(type, function (e) {
      // Only correct events that originated from real input, not our own clones.
      if (e.__corrected) return;

      const rect = scaler.getBoundingClientRect(); // displayed (scaled) box
      // Position within the displayed box, divided back to rendered space:
      const localX = (e.clientX - rect.left) / SCALE;
      const localY = (e.clientY - rect.top) / SCALE;

      // Build a corrected event with rendered-space coordinates.
      const corrected = new PointerEvent(type, {
        bubbles: true,
        cancelable: true,
        composed: true,
        pointerId: e.pointerId,
        pointerType: e.pointerType,
        isPrimary: e.isPrimary,
        button: e.button,
        buttons: e.buttons,
        width: e.width,
        height: e.height,
        pressure: e.pressure,
        clientX: rect.left + localX,   // place back near origin, unscaled
        clientY: rect.top + localY,
        screenX: e.screenX,
        screenY: e.screenY,
        ctrlKey: e.ctrlKey, shiftKey: e.shiftKey,
        altKey: e.altKey, metaKey: e.metaKey
      });
      corrected.__corrected = true;

      e.stopImmediatePropagation();
      e.preventDefault();
      target.dispatchEvent(corrected);
    }, true); // capture phase
  });

  // Mouse wheel zoom anchors at the cursor too — correct it the same way.
  scaler.addEventListener("wheel", function (e) {
    if (e.__corrected) return;
    const rect = scaler.getBoundingClientRect();
    const localX = (e.clientX - rect.left) / SCALE;
    const localY = (e.clientY - rect.top) / SCALE;
    const corrected = new WheelEvent("wheel", {
      bubbles: true, cancelable: true, composed: true,
      deltaX: e.deltaX, deltaY: e.deltaY, deltaMode: e.deltaMode,
      clientX: rect.left + localX, clientY: rect.top + localY,
      ctrlKey: e.ctrlKey, shiftKey: e.shiftKey
    });
    corrected.__corrected = true;
    e.stopImmediatePropagation();
    e.preventDefault();
    target.dispatchEvent(corrected);
  }, true);
}

    const webmap = new WebMap({
      portalItem: { id: CONFIG.portalItemId }
    });

    const view = new MapView({
      
      container: "viewDiv",
      map: webmap,
      // Disable popups entirely — navigation only.
      popup: { autoOpenEnabled: false },
      ui: { components: [] } // keep zoom buttons; drop attribution/etc.
    });


    // Hard-disable popups: remove popup templates after load, and block clicks.
    view.on("click", function (event) { event.stopPropagation(); });
    view.on("double-click", function (event) {
      // allow zoom on double-tap but never a popup
    });
    window.view = window;
    view.when(function () {

      

      locateLayers().then(function () {
        snapshotDefaults();

        // Turn off the MapImageLayer's per-ring labels for 502.
const lbl502 = getSublayer(502);
if (lbl502) lbl502.labelsVisible = false;

// Add the FeatureServer 502 as a transparent, labels-only layer.
const labelLayer = new FeatureLayer({
  url: "https://factmaps.sodir.no/api/rest/services/Factmaps/FactMapsWGS84/FeatureServer/502",
  outFields: ["fldName"],
  renderer: { type: "simple", symbol: {
    type: "simple-fill", color: [0,0,0,0], outline: { width: 0, color: [0,0,0,0] } } },
  labelsVisible: true,
  labelingInfo: [{
    labelExpressionInfo: { expression: "$feature.fldName" },
    labelPlacement: "always-horizontal",
    symbol: { type: "text", color: [29,29,27,1],
      haloColor: [255,255,255,0.85], haloSize: 1, font: { size: 8, family: "Arial" } },
    minScale: 0, maxScale: 0
  }]
});
const fill503 = getSublayer(503);
const grp500 = getSublayer(500);
function syncLabelVisibility() {
  if (!window.labelLayer) return;
  // labels show only when both the group and the child are on
  labelLayer.visible = !!(grp500 && grp500.visible) && !!(fill503 && fill503.visible);
}

if (grp500) grp500.watch("visible", syncLabelVisibility);
if (fill503) fill503.watch("visible", syncLabelVisibility);
syncLabelVisibility(); 

view.map.add(labelLayer);
window.labelLayer = labelLayer;


      window.factMapsLayer = factMapsLayer;


        goToExtent(CONFIG.extents.home, false).finally(function () {
          initialViewpoint = view.viewpoint.clone();
          armIdleTimer();
        });
      });
    }).catch(function (err) {
      console.error("View failed to load:", err);
    });


    function locateLayers() {
      const all = [];
      function walk(collection) {
        collection.forEach(function (lyr) {
          all.push(lyr);
          if (lyr.layers && lyr.layers.length) walk(lyr.layers);
        });
      }
      walk(webmap.layers);

      // FactMaps: prefer url match, then id, then title.
      factMapsLayer = all.find(function (l) {
        return l.url && l.url.indexOf(CONFIG.factMaps.urlContains) !== -1;
      }) || all.find(function (l) {
        return l.id === CONFIG.factMaps.layerId;
      }) || all.find(function (l) {
        return l.title === CONFIG.factMaps.title;
      }) || null;

      
      // Always-on layer by portal layer id.
      alwaysOnLayer = all.find(function (l) {
        return l.id === CONFIG.alwaysOnFeatureLayerId;
      }) || null;

      graticuleLayer = all.find(function (l) {
        return l.id === CONFIG.graticuleLayerId;
      }) || null;

      // Make sure the MapImageLayer and its sublayers are fully loaded so
      // findSublayerById works and sublayers collection is populated.
      const waits = [];
      if (factMapsLayer && factMapsLayer.load) waits.push(factMapsLayer.load());
      if (alwaysOnLayer && alwaysOnLayer.load) waits.push(alwaysOnLayer.load());
      if (graticuleLayer && graticuleLayer.load) waits.push(graticuleLayer.load());

      return Promise.all(waits).catch(function (e) {
        console.warn("Layer load issue:", e);
      });
    }

    /* =========================================================================
       SNAPSHOT PORTAL DEFAULTS
       Record the visibility of every FactMaps sublayer and every top-level
       layer exactly as the portal item defines them, so "reset" is faithful.
       =========================================================================*/
    function eachSublayer(cb) {
      if (!factMapsLayer || !factMapsLayer.sublayers) return;
      // sublayers is a flat-ish collection but can be nested; walk recursively.
      function walk(coll) {
        coll.forEach(function (s) {
          cb(s);
          if (s.sublayers && s.sublayers.length) walk(s.sublayers);
        });
      }
      walk(factMapsLayer.sublayers);
    }

    function snapshotDefaults() {
      defaultSublayerVis = {};
      eachSublayer(function (s) { defaultSublayerVis[s.id] = !!s.visible; });

      defaultTopLayerVis = {};
      webmap.layers.forEach(function (l) { defaultTopLayerVis[l.id] = !!l.visible; });
    }

    /* =========================================================================
       HELPERS for sublayer / layer visibility
       =========================================================================*/
    function setSublayerVisible(id, vis) {
      if (!factMapsLayer) return;
      const s = factMapsLayer.findSublayerById(id);
      if (s) s.visible = !!vis;
    }
    function getSublayer(id) {
      return factMapsLayer ? factMapsLayer.findSublayerById(id) : null;
    }

    // Turn off every FactMaps sublayer.
    function allSublayersOff() {
      TOP_GROUP_IDS.forEach(function (id) { setSublayerVisible(id, false); });
    }

    // Turn off every top-level operational layer in the webmap.
    function allTopLayersOff() {
      webmap.layers.forEach(function (l) { l.visible = false; });
    }

    // Re-assert the pinned/always-on layers (call at the END of every action).
    function assertAlwaysOn() {
      // FactMaps must be visible as a container for its sublayers.
      if (factMapsLayer) factMapsLayer.visible = true;
      

      // Pin 800 and ALL of its descendant sublayers on.
      CONFIG.pinnedSublayerIds.forEach(function (pid) {
        const top = getSublayer(pid);
        if (top) {
          top.visible = true;
          if (top.sublayers && top.sublayers.length) {
            (function walk(coll) {
              coll.forEach(function (c) {
                c.visible = true;
                if (c.sublayers && c.sublayers.length) walk(c.sublayers);
              });
            })(top.sublayers);
          }
        }
      });

      // Always-on feature layer.
      if (alwaysOnLayer) alwaysOnLayer.visible = true;
      if (graticuleLayer) graticuleLayer.visible = true;
    }

    /* =========================================================================
       RESET TO PORTAL DEFAULTS
       Restore the snapshot, then re-assert always-on. Used at the start of
       every button action and on idle reset.
       =========================================================================*/
    function resetToDefaults() {
      eachSublayer(function (s) {
        if (s.id in defaultSublayerVis) s.visible = defaultSublayerVis[s.id];
      });
      webmap.layers.forEach(function (l) {
        if (l.id in defaultTopLayerVis) l.visible = defaultTopLayerVis[l.id];
      });
      assertAlwaysOn();
    }


    function goToExtent(extObj, animate) {
      const ext = new Extent({
        xmin: extObj.xmin, ymin: extObj.ymin,
        xmax: extObj.xmax, ymax: extObj.ymax,
        spatialReference: { wkid: 3857 }
      });
      return view.goTo(ext, { animate: animate !== false, duration: 900 })
                 .catch(function () {});
    }

    function resolveSublayerExtent(sublayerId) {
      const key = "sub:" + sublayerId;
      if (extentCache[key]) return Promise.resolve(extentCache[key]);
      const s = getSublayer(sublayerId);
      if (!s) return Promise.resolve(null);
      return s.createFeatureLayer().then(function (fl) {
        return fl.queryExtent().then(function (res) {
          const ext = res && res.extent ? res.extent.expand(1.15) : null;
          if (ext) extentCache[key] = ext;
          return ext;
        });
      }).catch(function () { return null; });
    }

    function goToSublayerExtent(sublayerId) {
      return resolveSublayerExtent(sublayerId).then(function (ext) {
        if (ext) return view.goTo(ext, { duration: 900 }).catch(function () {});
      });
    }

    function resolveAlwaysOnExtent() {
      const key = "alwayson";
      if (extentCache[key]) return Promise.resolve(extentCache[key]);
      if (!alwaysOnLayer) return Promise.resolve(null);
      if (alwaysOnLayer.fullExtent) {
        extentCache[key] = alwaysOnLayer.fullExtent.expand(1.15);
        return Promise.resolve(extentCache[key]);
      }
      if (alwaysOnLayer.queryExtent) {
        return alwaysOnLayer.queryExtent().then(function (res) {
          const ext = res && res.extent ? res.extent.expand(1.15) : null;
          if (ext) extentCache[key] = ext;
          return ext;
        }).catch(function () { return null; });
      }
      return Promise.resolve(null);
    }
    function goToSea(whereClause) {
      const s = getSublayer(803);
      if (!s) return Promise.resolve();
      return s.createFeatureLayer().then(function (fl) {
        return fl.queryExtent({ where: whereClause }).then(function (res) {
          if (res && res.extent) {
            return view.goTo(res.extent.expand(1.1), { animate: true }).catch(function () {});
          }
        });
      }).catch(function (e) { console.warn("803 sea query failed:", whereClause, e); });
    }

    function goToAlwaysOnExtent() {
      return resolveAlwaysOnExtent().then(function (ext) {
        if (ext) return view.goTo(ext, { duration: 900 }).catch(function () {});
      });
    }

   const actions = {
      northsea:     function(){return goToSea("qadName < '1000'"); },
      norwegiansea: function(){return goToSea("qadName >= '1000' AND qadName <= '6900'"); },
      barents:      function(){return goToSea("qadName > '6900'"); },

      fields: function () {
        // hydrocarbon
        resetToDefaults();
        allTopLayersOff();
        allSublayersOff();
        setSublayerVisible(500, true);
        setSublayerVisible(502, true);
         setSublayerVisible(600, true);
         setSublayerVisible(625, false);
         setSublayerVisible(611, false);
        setSublayerVisible(503, true);
        assertAlwaysOn();
        return goToSublayerExtent(502);
      },

      explorationwells: function () {
        //current wells
        resetToDefaults();
        setSublayerVisible(300, false)
        setSublayerVisible(200, true);
        setSublayerVisible(203, true);        
        assertAlwaysOn();
        return goToSublayerExtent(203);
      },

      co2: function () {
        resetToDefaults();
        allTopLayersOff();
        allSublayersOff();
        setSublayerVisible(626, true);
        setSublayerVisible(625, true);
        setSublayerVisible(600, true);
        setSublayerVisible(611, false);
        assertAlwaysOn();
        return goToSublayerExtent(626);
      },

      minerals: function () {
        resetToDefaults();
        allTopLayersOff();
        allSublayersOff();
        setSublayerVisible(900, true);
        setSublayerVisible(901, true);
        assertAlwaysOn();
        return goToSublayerExtent(901);
      }
    };

    /* =========================================================================
       WIRE UP BUTTONS
       =========================================================================*/
let actionRunning = false;
    document.querySelectorAll(".kioskBtn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        const key = btn.getAttribute("data-action");
        if (!actions[key] || actionRunning) return;
        actionRunning = true;
        Promise.resolve(actions[key]()).finally(function () {
          actionRunning = false;
          armIdleTimer();
        });
      });
    });

    /* =========================================================================
       IDLE RESET (25s)
       Any pointer/touch interaction on the page resets the timer. When it
       fires, restore initial layers + extent.
       =========================================================================*/
    function armIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(idleReset, CONFIG.idleMs);
    }
    function idleReset() {
      resetToDefaults();
      if (initialViewpoint) {
        view.goTo(initialViewpoint, { duration: 900 }).catch(function () {});
      } else {
        goToExtent(CONFIG.extents.home);
      }
      armIdleTimer();
    }

    // Reset idle timer on ANY interaction (touch, mouse, map drag, zoom).
    ["pointerdown", "pointermove", "wheel", "touchstart", "keydown"]
      .forEach(function (evt) {
        window.addEventListener(evt, armIdleTimer, { passive: true });
      });
    // Map view interactions (pan/zoom) also count.
    view.watch("interacting", function (v) { if (v) armIdleTimer(); });
    view.watch("stationary", function () { /* no-op, but keeps watcher alive */ });

  }); // require
  
  </script>
</body>
</html>
